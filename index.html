<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="display-area">
          <output class="current-output">123456789</output>
        </div>
        <div class="buttons">
          <div class="button-row" id="top">
            <button id="clear">Clear</button>
            <div></div>
            <div></div>
            <button>/</button>
          </div>
          <div class="button-row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>x</button>
          </div>
          <div class="button-row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
          </div>
          <div class="button-row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
          </div>
          <div class="button-row">
            <div></div>
            <button>0</button>
            <div></div>
            <button>=</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script.js" defer></script>
  </body>
</html>
